{% assign interests = site.data.data.sidebar.interests %}
{% if interests %}
<div class="interests-container container-block">

  <h2 class="container-block-title">
    {{ interests.title }}
  </h2>

  <ul class="list-unstyled interests-list">
    {% for interest in interests.info %}

    {% if interest.link %}
    <li><a href="{{ interest.link }}">{{ interest.item }}</a></li>
    {% else %}
    <li>
      <img class="interests-icon" src="{{ site.baseurl }}/assets/icons/{{ interest.icon }}" alt="interest icon" />
      {{ interest.item }}
    </li>
    {% endif %}

    {% endfor %}
  </ul>

</div><!--//interests-->
{% endif %}
